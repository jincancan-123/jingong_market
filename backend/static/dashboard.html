<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>调味品营销战情室</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f1c34;
            color: #fff;
            font-family: "Microsoft YaHei", sans-serif;
            padding: 20px;
        }
        .header {
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #4fc3f7;
        }
        .overview-cards {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .card {
            flex: 1;
            background: rgba(79, 195, 247, 0.1);
            border: 1px solid #4fc3f7;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }
        .card .num {
            font-size: 32px;
            font-weight: bold;
            color: #4fc3f7;
            margin: 8px 0;
        }
        .card .label { font-size: 14px; color: #b0bec5; }
        .charts-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .chart-box {
            flex: 1;
            background: rgba(79, 195, 247, 0.05);
            border: 1px solid #1e3a5f;
            border-radius: 8px;
            padding: 15px;
            height: 320px;
        }
        .chart-title {
            font-size: 16px;
            margin-bottom: 10px;
            color: #81d4fa;
        }
    </style>
</head>
<body>
    <div class="header">调味品行业营销数据战情室</div>

    <!-- 核心指标卡片 -->
    <div class="overview-cards">
        <div class="card">
            <div class="label">商品总数</div>
            <div class="num" id="totalProduct">-</div>
        </div>
        <div class="card">
            <div class="label">估算总GMV(元)</div>
            <div class="num" id="totalGmv">-</div>
        </div>
        <div class="card">
            <div class="label">总销量</div>
            <div class="num" id="totalSales">-</div>
        </div>
        <div class="card">
            <div class="label">数据最新更新时间</div>
            <div class="num" style="font-size:18px" id="latestUpdate">-</div>
        </div>
    </div>

    <!-- 第一行图表 -->
    <div class="charts-row">
        <div class="chart-box">
            <div class="chart-title">各平台销量占比</div>
            <div id="platformChart" style="width:100%;height:260px"></div>
        </div>
        <div class="chart-box">
            <div class="chart-title">商品价格区间分布</div>
            <div id="priceChart" style="width:100%;height:260px"></div>
        </div>
    </div>

    <!-- 第二行图表 -->
    <div class="charts-row">
        <div class="chart-box" style="flex:2">
            <div class="chart-title">竞品品牌商品数量分布</div>
            <div id="brandChart" style="width:100%;height:260px"></div>
        </div>
    </div>

    <script>
        const BASE_URL = "http://127.0.0.1:8000";

        // 初始化ECharts实例
        const platformChart = echarts.init(document.getElementById('platformChart'));
        const priceChart = echarts.init(document.getElementById('priceChart'));
        const brandChart = echarts.init(document.getElementById('brandChart'));

        // 请求后端大屏接口加载数据
        async function loadDashboardData() {
            const res = await fetch(`${BASE_URL}/dashboard/overview`);
            const json = await res.json();
            const data = json.data;

            // 顶部数字卡片赋值
            document.getElementById('totalProduct').innerText = data.overview.total_product;
            document.getElementById('totalGmv').innerText = data.overview.total_gmv.toLocaleString();
            document.getElementById('totalSales').innerText = data.overview.total_sales.toLocaleString();
            document.getElementById('latestUpdate').innerText = data.overview.latest_update;

            // 平台销量环形饼图
            platformChart.setOption({
                tooltip: { trigger: 'item' },
                series: [{
                    type: 'pie',
                    radius: ['40%', '70%'],
                    data: data.platform_dist.map(item => ({
                        name: item.platform,
                        value: item.sales
                    }))
                }]
            });

            // 价格分布柱状图
            priceChart.setOption({
                tooltip: { trigger: 'axis' },
                xAxis: {
                    type: 'category',
                    data: data.price_dist.map(i => i.range)
                },
                yAxis: { type: 'value' },
                series: [{
                    type: 'bar',
                    data: data.price_dist.map(i => i.count)
                }]
            });

            // 竞品品牌横向条形图
            brandChart.setOption({
                tooltip: { trigger: 'axis' },
                xAxis: { type: 'value' },
                yAxis: {
                    type: 'category',
                    data: data.brand_dist.map(i => i.brand)
                },
                series: [{
                    type: 'bar',
                    data: data.brand_dist.map(i => i.count)
                }]
            });
        }

        loadDashboardData();
        // 窗口缩放自适应图表
        window.addEventListener('resize', () => {
            platformChart.resize();
            priceChart.resize();
            brandChart.resize();
        });
    </script>
</body>
</html>
